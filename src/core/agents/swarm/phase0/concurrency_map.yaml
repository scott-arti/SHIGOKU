# =============================================================================
# 4. Mutable State Inventory
# =============================================================================
mutable_state_inventory:
  - name: "current_context"
    location: "BaseManagerAgent.current_context (base_manager.py:66, 180)"
    state_classification: "shared_mutable"
    protection_reason: >
      Overwritten per dispatch. Concurrent dispatches would corrupt
      each other's context (findings, params, auth_headers).
      Phase 3 must introduce dispatch-local context isolation.
    readers:
      - "BaseManagerAgent.dispatch (writer)"
      - "_execute_tool (reader: auth_headers, cookies)"
      - "report_finding (reader/writer: findings)"
    protection_phase: "Phase 3"

  - name: "swarm_pool (_swarm_pool)"
    location: "SwarmDispatcher._swarm_pool (swarm_dispatcher.py:75, 93)"
    state_classification: "shared_mutable"
    protection_reason: >
      Swarm instances are cached and reused across dispatches.
      Stateful managers (BaseManagerAgent) carry mutable state.
      Phase 3: classify stateless_reusable vs dispatch_scoped.
    readers:
      - "SwarmDispatcher.dispatch (reader/writer)"
      - "SwarmDispatcher.dispatch_to_all (reader/writer)"
      - "SwarmDispatcher._get_or_create_swarm (reader/writer)"
    protection_phase: "Phase 3"

  - name: "semaphore"
    location: "SwarmManager.semaphore (base.py:241, 336)"
    state_classification: "shared_mutable"
    protection_reason: >
      asyncio.Semaphore(max_concurrent=5) shared across dispatches.
      Cross-dispatch coordination point. Not a hazard but must be
      documented for Phase 5 parallelism planning.
    readers:
      - "SwarmManager.dispatch (acquires/releases)"
      - "BaseManagerAgent.dispatch (acquires/releases for LLM/tools)"
    protection_phase: "Phase 5"

  - name: "event_bus"
    location: "SwarmDispatcher.event_bus (swarm_dispatcher.py:74)"
    state_classification: "external_state"
    protection_reason: >
      EventBus used for cross-component communication.
      Queue full/drop behavior, retry, dead-letter not yet inventoried.
      Phase 6: event classification (critical/important/best_effort).
    readers:
      - "SwarmDispatcher (writer: SWARM_DISPATCHED events)"
      - "EventBus subscribers (readers)"
    protection_phase: "Phase 6"

  - name: "rate_limiter"
    location: "ParallelOrchestrator / AdaptiveRateLimiter"
    state_classification: "external_state"
    protection_reason: >
      Host/task unit rate limiting. Target extraction logic (string-based
      from Task object). Per-origin budget not yet implemented.
      Phase 2: origin_key normalization, per-origin budget policy.
    readers:
      - "ParallelOrchestrator (reader/writer)"
      - "AggressiveLimiter (reader/writer)"
    protection_phase: "Phase 2"

  - name: "_aggressive_limiter"
    location: "SwarmDispatcher._aggressive_limiter (swarm_dispatcher.py:78)"
    state_classification: "shared_mutable"
    protection_reason: >
      AggressiveLimiter controls HITL approval and semaphore for
      POST/PUT/DELETE mutations. Shared across dispatches.
    readers:
      - "SwarmDispatcher._dispatch_to_single_swarm (acquires/releases)"
    protection_phase: "Phase 2"

  - name: "_dispatcher (singleton)"
    location: "swarm_dispatcher.py:580 (module-level)"
    state_classification: "shared_mutable"
    protection_reason: >
      SwarmDispatcher is a global singleton. Concurrent access to
      _swarm_pool, llm_client, network_client through this singleton.
    readers:
      - "get_swarm_dispatcher (reader/writer)"
      - "MasterConductor (reader)"
    protection_phase: "Phase 3"

  - name: "cookie / auth_headers / temp artifacts"
    location: "BaseManagerAgent.current_context.params (various)"
    state_classification: "dispatch_local"
    protection_reason: >
      Currently stored in current_context (shared mutable).
      Should be dispatch-local. Cookie sharing across specialists
      within same dispatch is intentional; across dispatches is the risk.
    readers:
      - "BaseManagerAgent._execute_tool"
      - "InjectionManagerAgent._refresh_auth_context_on_timeout"
    protection_phase: "Phase 3"

  - name: "network_client"
    location: "SwarmManager.network_client (base.py:232)"
    state_classification: "shared_mutable"
    protection_reason: >
      Shared across all specialists within a SwarmManager.
      Connection pool, cookies, headers are shared state.
    readers:
      - "All specialists via set_network_client"
      - "BaseManagerAgent._resolve_request_client"
    protection_phase: "Phase 2"

