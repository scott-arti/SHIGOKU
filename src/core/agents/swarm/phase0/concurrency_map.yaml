# =============================================================================
# 10. Classification Rules Table
# =============================================================================
classification_rules:
  - classification: "parallel_safe"
    definition: "独立したtarget、副作用なし、読み取り専用。並列化して安全。"
    criteria:
      - "targetが他タスクと独立"
      - "副作用（POST/PUT/DELETE）なし"
      - "認証状態を変更しない"
      - "rate limit超過リスクが低い"
    unknown_treatment: "N/A"

  - classification: "sequential_required"
    definition: "順序依存があるか、前段の結果に依存する処理。直列実行が必要。"
    criteria:
      - "先行タスク/先行specialistの結果に依存"
      - "adaptive skip が順序前提"
      - "LLMコンテキストが順次蓄積（Think-Act-Observe loop）"
    unknown_treatment: "N/A"

  - classification: "rate_limited"
    definition: "リクエスト量が多く、レート制限が必要。制限内であれば並列化可能。"
    criteria:
      - "同一originへの複数リクエスト"
      - "per-origin budget 管理下で実行可能"
      - "タイムアウトやcooldownが実装済み"
    unknown_treatment: "N/A"

  - classification: "stateful"
    definition: "認証状態、セッション、コンテキストに依存する処理。dispatch-local isolationが必要。"
    criteria:
      - "auth_headers に依存"
      - "セッション状態を読み書き"
      - "current_context を変更"
      - "同一セッション内の排他制御が必要"
    unknown_treatment: "N/A"

  - classification: "aggressive_exclusive"
    definition: "破壊的操作または高負荷操作。明示gate、allowlist、audit trailが必須。"
    criteria:
      - "POST/PUT/DELETE による状態変更"
      - "高負荷リクエスト（fuzzing等）"
      - "防御機構（WAF/FW）をトリガーするリスク"
    unknown_treatment: "N/A"

  - classification: "unknown"
    definition: "分類が未確定。安全側に倒してsequential_required相当で扱う。"
    criteria:
      - "コード参照による判定根拠が不足"
      - "internal parallelism の活性化状態が不明"
    default_treatment: "sequential_required 相当として扱い、並列化しない"
    promotion_criteria:
      - "コード参照によるroot cause確認"
      - "該当コードパスの活性化状態確認"
      - "テストによる並列安全性の検証"
      - "Phase 評価での再分類"
