parallel_sequential_classification:
  mc_outer:
    - file: "src/core/engine/master_conductor.py"
      function: "MasterConductor._execute_parallel_phase"
      line: 5834
      primitive: "batch_tasks → execute_parallel() for non-injection"
      classification: "parallel_safe"
      rationale: >
        MC outer layer dispatches non-injection tasks to ParallelOrchestrator
        in a single parallel batch. Read-only tasks with independent targets
        are parallel-safe.
      code_evidence: "Line 5834: self.orchestrator.execute_parallel(p_tasks, ...)"

    - file: "src/core/engine/master_conductor.py"
      function: "MasterConductor._execute_parallel_phase"
      line: 5746
      primitive: "injection batch_size gate (suggested_batch=1)"
      classification: "sequential_required"
      rationale: >
        Injection tasks default to batch_size=1 (sequential).
        Only injection_batch_parallelism > 1 enables batching.
      code_evidence: "Line 5746-5756: suggested_batch clamped to 1 for injection"

    - file: "src/core/engine/parallel_orchestrator.py"
      function: "ParallelOrchestrator._run_task"
      line: 233
      primitive: "asyncio.create_task + asyncio.wait fan-out"
      classification: "rate_limited"
      rationale: >
        Per-category asyncio.Semaphore (line 217) limits concurrent tasks
        within each category. AdaptiveRateLimiter (line 196) applies
        host-level rate control.
      code_evidence: "Line 233: asyncio.create_task, line 217: semaphore, line 196: limiter"

  swarm_dispatcher:
    - file: "src/core/engine/swarm_dispatcher.py"
      function: "SwarmDispatcher.dispatch"
      line: 243
      primitive: "for swarm_name in swarm_names"
      classification: "sequential_required"
      rationale: >
        Swarms are dispatched one after another via a for loop.
        _swarm_pool is shared across dispatches (pool reuse).
        Parallelizing this would require dispatch context isolation (Phase 3).
      code_evidence: "Line 243: for swarm_name in swarm_names:"

    - file: "src/core/engine/swarm_dispatcher.py"
      function: "SwarmDispatcher._get_or_create_swarm"
      line: 93
      primitive: "pool reuse (_swarm_pool)"
      classification: "stateful"
      rationale: >
        Swarm instances are cached in _swarm_pool dict and reused.
        Stateful managers (BaseManagerAgent) carry current_context
        that can be polluted across dispatches. Phase 3 must address this.
      code_evidence: "Line 75: self._swarm_pool: Dict[str, SwarmManager]"

  swarm_manager:
    - file: "src/core/agents/swarm/base.py"
      function: "SwarmManager.dispatch"
      line: 332
      primitive: "for specialist in specialists"
      classification: "sequential_required"
