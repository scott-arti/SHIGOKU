# =============================================================================
# 8. Adaptive Skip Protection (High/Critical)
# =============================================================================
adaptiveskip_protection:
  protected: true
  location: "src/core/agents/swarm/base.py SwarmManager.dispatch() lines 354-369"
  semantics: >
    After each specialist completes, findings are inspected for
    Severity.CRITICAL or Severity.HIGH. If found AND adaptive_skip_enabled
    (default True), remaining specialists are skipped and recorded
    with status='skipped', reason='critical_finding_detected'.
    This is PROTECTED BEHAVIOR: Phase 8 may redesign but must
    preserve the meaning that critical findings trigger escalation.
  trigger_condition: "critical_findings list non-empty + adaptive_skip_enabled=True"
  observation_point: "specialist findings after each iteration of the for loop"
  result_aggregation: "remaining specialists recorded in execution_log as skipped"
  protection_boundary: "Phase 0-7: semantics unchanged. Phase 8: may redesign internal parallelization but must preserve skip semantics"
  causal_memo: >
    Input: specialist findings (List[Finding]) after each specialist execution
    Check: any(f.severity in [CRITICAL, HIGH] for f in findings)
    Action: break out of for loop, mark remaining specialists as skipped
    Output: execution_log entries for skipped specialists

