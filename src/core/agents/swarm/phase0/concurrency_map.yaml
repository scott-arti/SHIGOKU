      code_evidence: "Line 241: asyncio.Semaphore(max_concurrent)"

    - file: "src/core/agents/swarm/base_manager.py"
      function: "BaseManagerAgent.dispatch"
      line: 218
      primitive: "while turn < self.max_turns"
      classification: "sequential_required"
      rationale: >
        Think-Act-Observe loop depends on sequential context
