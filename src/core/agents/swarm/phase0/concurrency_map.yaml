      code_evidence: "Line 180: self.current_context = {...}"

  specialist_internal:
    - file: "src/core/agents/swarm/base.py"
      function: "Specialist.run_with_timeout"
      line: 184
      primitive: "asyncio.wait_for"
      classification: "parallel_safe"
