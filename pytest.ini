[pytest]
pythonpath = src
asyncio_mode = auto
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning

# Phase D Integration Tests
markers =
    d1: Phase D-1 Infrastructure tests
    d2: Phase D-2 Detection Engine tests
    d3: Phase D-3 Advanced Feature tests
    integration: Integration tests
    unit: Unit tests
