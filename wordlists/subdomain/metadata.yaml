      standard: subdomains-top1million-20000.txt
      deep: subdomains-top1million-110000.txt
    ctf:
      quick: subdomains-top1million-5000.txt
      standard: subdomains-top1million-5000.txt
      deep: subdomains-top1million-20000.txt

  tech_stack:
    aws: 2m-subdomains.txt
    gcp: 2m-subdomains.txt
    azure: 2m-subdomains.txt
    modern: httparchive_subdomains_2025_11_27.txt
