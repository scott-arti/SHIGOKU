name: subdomain_takeover
description: "Golden Recipe: Check for Subdomain Takeover vulnerabilities"
agent: swarm
trigger:
  type: signal
  required_signals:
    - dns_dead
    - cname_dangling
  success_condition: "provider_identified_and_dangling_evidence_collected"
  stop_condition: "provider_unknown_or_signal_stale_or_claim_prerequisite_missing"
tags:
  - recon
  - takeover
  - dns
severity: critical
steps:
  - id: step_0
    name: "CNAME resolution"
    action: "cname_resolve"
    params:
      source: "dead_subs"
    dependencies: []
  - id: step_1
    name: "Provider fingerprinting"
    action: "http_probe"
    params:
      method: "GET"
      follow_redirects: true
      timeout: 10
    dependencies:
      - step_0
  - id: step_2
    name: "Takeover candidate scan"
    action: "check_takeover"
    params:
      tools:
        - subjack
        - subzy
        - nuclei
    dependencies:
      - step_0
      - step_1
