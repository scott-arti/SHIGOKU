name: GraphQL Runtime CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"   # Nightly UTC
    - cron: "0 4 * * 1"   # Weekly UTC Monday
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  graphql-runtime-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: PR Runtime Checks
        run: |
          pytest tests/core/agents/swarm/test_discovery_graphql_contract.py -q
          pytest tests/core/agents/swarm/test_discovery_graphql_alerting.py -q

      - name: Notify PR failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "GraphQL Runtime CI failed.",
              `Workflow: ${context.workflow}`,
              `Run: ${context.runId}`,
              "Please check failing tests in job logs."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  graphql-runtime-nightly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Nightly Runtime Checks
        run: |
          pytest tests/core/agents/swarm/test_discovery_graphql_contract.py -q
          pytest tests/core/agents/swarm/test_discovery_graphql_longrun.py -q

      - name: Notify Nightly failure (issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Nightly GraphQL Runtime CI Failure";
            const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q });
            if (existing.data.total_count === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Nightly GraphQL runtime checks failed.\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }

  graphql-runtime-weekly:
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Weekly Runtime Burn-in
        run: |
          pytest tests/core/agents/swarm/test_discovery_graphql_longrun.py -q

      - name: Notify Weekly failure (issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Weekly GraphQL Runtime Burn-in Failure";
            const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q });
            if (existing.data.total_count === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Weekly GraphQL runtime burn-in failed.\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }
